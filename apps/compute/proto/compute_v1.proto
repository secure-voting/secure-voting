syntax = "proto3";

package securevoting.compute.v1;

option go_package = "secure-voting/apps/backend/internal/compute/pb;pb";

import "google/protobuf/wrappers.proto";

message Candidate {
  string id = 1;
  string name = 2;
}

message RunHeader {
  string kind = 1;
  string run_id = 2;
  string election_id = 3;
  string dataset_id = 4;

  string tally_rule = 5;
  string ballot_format = 6;

  google.protobuf.Int32Value committee_size = 7;
  google.protobuf.StringValue quota_type = 8;

  google.protobuf.BoolValue show_aggregates = 9;

  google.protobuf.Int32Value approval_max_choices = 10;
  google.protobuf.Int32Value ranking_top_k = 11;

  google.protobuf.Int32Value score_min = 12;
  google.protobuf.Int32Value score_max = 13;
  google.protobuf.Int32Value score_step = 14;
  google.protobuf.BoolValue score_allow_skip = 15;

  bytes params_json = 16;
  repeated Candidate candidates = 17;
}

message ApprovalBallot {
  repeated string approvals = 1;
}

message RankingBallot {
  repeated string ranking = 1;
}

message ScoreEntry {
  string candidate_id = 1;
  int32 value = 2;
}

message ScoreBallot {
  repeated ScoreEntry scores = 1;
}

message Ballot {
  string voter_ref = 1;
  oneof payload {
    ApprovalBallot approval = 2;
    RankingBallot ranking = 3;
    ScoreBallot score = 4;
  }
}

message BallotBatch {
  repeated Ballot ballots = 1;
}

message RunChunk {
  oneof part {
    RunHeader header = 1;
    BallotBatch batch = 2;
  }
}

message RunResult {
  string status = 1;
  string error_text = 2;

  bytes winners_json = 3;
  bytes metrics_json = 4;
  bytes protocol_json = 5;

  bytes timings_json = 6;
  bytes artifacts_json = 7;
}

service Compute {
  rpc Run (stream RunChunk) returns (RunResult);
}

