[package]
categories = [
  "asynchronous",
  "network-programming",
  "web-programming::http"
]
description = "An RPC-service capable of electing a winner in a ranked-ballot voting configuration"
edition = "2024"
keywords = [
  "election",
  "rpc",
  "service",
  "voting"
]
license.workspace=true
name = "compute-service"
repository = "https://github.com/schukark/secure-voting.git"
version = "0.1.0"

build = "src/build.rs"

[dependencies]
prost = "0.14.3"
tokio = { version = "1.49.0", features = ["macros", "rt-multi-thread"] }
tonic = { version = "0.14.2", features = ["server"] }
tonic-prost = "0.14.2"
prost-types = "0.14.3"
voting-core = {path = "../voting-core", version = "0.1.0"}
futures = "0.3.31"
rdkafka = { version = "0.39.0", features = ["cmake-build"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"

[lints]
workspace=true

[build-dependencies]
tonic-prost-build = "0.14.2"

[package.metadata.clippy]
config-file = "../../clippy.toml"
