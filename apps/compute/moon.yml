language: 'rust'
layer: 'application'

env:
  CARGO_TERM_COLOR: 'always'

fileGroups:
  sources:
    - '*/src/**/*'
    - '*/Cargo.toml'
    - 'Cargo.toml'
  tests:
    - '*/benches/**/*'
    - '*/tests/**/*'

tasks:
  build:
    command: 'cargo build --release'
    inputs:
      - '@globs(sources)'
  test:
    command: 'nextest run --workspace'
    toolchain: 'rust'
    inputs:
      - '@globs(sources)'
      - '@globs(tests)'
  lint:
    command: "cargo clippy --workspace"
    inputs:
      - '@globs(sources)'
      - '@globs(tests)'
  check:
    command: 'cargo check --workspace'
    inputs:
      - '@globs(sources)'
  format:
    command: 'cargo fmt --all --check'
    inputs:
      - '@globs(sources)'
      - '@globs(tests)'
  coverage:
    command: 'cargo tarpaulin'
    inputs:
      - '@globs(sources)'
      - '@globs(tests)'
