tasks:
  build:
    command: "cargo build --release"
    inputs:
      - 'voting-core/src/**'
      - 'compute-service/src/**'
      - '**/Cargo.toml'
    outputs:
      - 'target'
  test:
    command: "nextest run --workspace"
    inputs:
      - 'voting-core/src/**'
      - 'compute-service/src/**'
      - '**/Cargo.toml'
      - 'target'
    deps:
      - '~:build'
  lint:
    command: "cargo clippy -- -Dwarnings -D clippy::pedantic"
    inputs:
      - 'voting-core/src/**'
      - 'compute-service/src/**'
      - '**/Cargo.toml'
