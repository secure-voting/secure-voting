tasks:
  build:
    command: "cargo build --release"
    inputs:
      - 'voting-core/src/**'
      - 'compute-service/src/**'
      - '**/Cargo.toml'
    outputs:
      - 'target'
  test:
    command: "cargo test --release"
    inputs:
      - 'voting-core/src/**'
      - 'compute-service/src/**'
      - '**/Cargo.toml'
    outputs:
      - 'target'
  lint:
    command: "cargo clippy -- -Dwarnings -D clippy::pedantic"
    inputs:
      - 'voting-core/src/**'
      - 'compute-service/src/**'
      - '**/Cargo.toml'
