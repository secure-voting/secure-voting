openapi: 3.1.0
info:
  title: Secure Voting REST API
  version: 0.1.0
  description: >
    REST API for the secure-voting diploma project:
    client-server application for conducting and evaluating multi-member electronic elections.

servers:
  - url: http://localhost:3001

tags:
  - name: System
  - name: Auth
  - name: Elections
  - name: Ballots
  - name: Results
  - name: Experiments
  - name: Experiment Runs
  - name: Jobs
  - name: Audit

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-token

  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          const: true

    User:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum: [admin, voter, researcher]

    AuthResponse:
      type: object
      required: [access_token, expires_at, user]
      properties:
        access_token:
          type: string
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        role:
          type: string
          description: >
            Public registration is intended for voter accounts.
            This field is accepted by the backend handler but should not be used
            to self-assign privileged roles.
        invite_code:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        invite_code:
          type: string

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string

    CandidateInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        meta:
          type: object
          additionalProperties: true

    Candidate:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        meta:
          type: object
          additionalProperties: true

    ElectionCreateRequest:
      type: object
      required:
        - title
        - start_at
        - end_at
        - tally_rule
        - ballot_format
        - access_mode
        - candidates
      properties:
        title:
          type: string
        description:
          type: string
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        tally_rule:
          type: string
        ballot_format:
          type: string
          enum: [approval, ranking, score]
        committee_size:
          type: integer
        quota_type:
          type: string
          enum: [hare, droop]
        access_mode:
          type: string
          enum: [open, invite]
        publish_at:
          type: string
          format: date-time
        show_aggregates:
          type: boolean
        approval_max_choices:
          type: integer
        ranking_top_k:
          type: integer
        score_min:
          type: integer
        score_max:
          type: integer
        score_step:
          type: integer
        score_allow_skip:
          type: boolean
        candidates:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CandidateInput'

    ElectionCreateResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid

    ElectionSummary:
      type: object
      required: [id, title, status, access_mode, start_at, end_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
        access_mode:
          type: string
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        published_at:
          type: string
          format: date-time

    ElectionListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ElectionSummary'

    ElectionDetail:
      type: object
      required:
        - id
        - title
        - status
        - access_mode
        - ballot_format
        - tally_rule
        - start_at
        - end_at
        - show_aggregates
        - score_allow_skip
        - candidates
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
        access_mode:
          type: string
          enum: [open, invite]
        ballot_format:
          type: string
          enum: [approval, ranking, score]
        tally_rule:
          type: string
        committee_size:
          type: integer
        quota_type:
          type: string
          enum: [hare, droop]
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        publish_at:
          type: string
          format: date-time
        published_at:
          type: string
          format: date-time
        show_aggregates:
          type: boolean
        approval_max_choices:
          type: integer
        ranking_top_k:
          type: integer
        score_min:
          type: integer
        score_max:
          type: integer
        score_step:
          type: integer
        score_allow_skip:
          type: boolean
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/Candidate'

    ElectionRulesUpdateRequest:
      type: object
      properties:
        tally_rule:
          type: string
        ballot_format:
          type: string
          enum: [approval, ranking, score]
        committee_size:
          type: integer
        quota_type:
          type: string
          enum: [hare, droop]
        access_mode:
          type: string
          enum: [open, invite]
        publish_at:
          type: string
          format: date-time
        show_aggregates:
          type: boolean
        approval_max_choices:
          type: integer
        ranking_top_k:
          type: integer
        score_min:
          type: integer
        score_max:
          type: integer
        score_step:
          type: integer
        score_allow_skip:
          type: boolean

    InviteCreateRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string

    InviteCreated:
      type: object
      required: [invite_id, email, invite_code, status, created_at]
      properties:
        invite_id:
          type: string
          format: uuid
        email:
          type: string
        invite_code:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    Invite:
      type: object
      required: [id, email, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        status:
          type: string
        sent_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    InviteListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Invite'

    BallotMetaResponse:
      type: object
      required: [election_id, ballot_format, tally_rule, score_allow_skip, candidates]
      properties:
        election_id:
          type: string
          format: uuid
        title:
          type: string
        ballot_format:
          type: string
          enum: [approval, ranking, score]
        tally_rule:
          type: string
        committee_size:
          type: integer
        approval_max_choices:
          type: integer
        ranking_top_k:
          type: integer
        score_min:
          type: integer
        score_max:
          type: integer
        score_step:
          type: integer
        score_allow_skip:
          type: boolean
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/Candidate'

    BallotSubmitRequest:
      type: object
      properties:
        approval_set:
          type: array
          items:
            type: string
        ranking:
          type: array
          items:
            type: string
        scores:
          type: object
          additionalProperties:
            type: integer

    BallotSubmitResponse:
      type: object
      required: [ballot_id, status]
      properties:
        ballot_id:
          type: string
          format: uuid
        status:
          type: string

    MyBallotResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
        submitted_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ResultResponse:
      type: object
      required: [election_id, version, method, winners]
      properties:
        election_id:
          type: string
          format: uuid
        version:
          type: integer
        method:
          type: string
        winners: {}
        params: {}
        metrics: {}
        protocol: {}
        published_at:
          type: string
          format: date-time

    DatasetCandidate:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string

    Dataset:
      type: object
      required: [id, name, source, format, candidates, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        source:
          type: string
          enum: [import, generate, external]
        format:
          type: string
          enum: [approval, ranking, score]
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/DatasetCandidate'
        created_at:
          type: string
          format: date-time
        seed:
          type: integer
        parameters:
          type: object
          additionalProperties: true

    DatasetListItem:
      type: object
      required: [id, name, source, format, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        source:
          type: string
        format:
          type: string
        created_at:
          type: string
          format: date-time

    DatasetListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DatasetListItem'

    DatasetGenerateRequest:
      type: object
      required: [name, format, candidates, voters]
      properties:
        name:
          type: string
        description:
          type: string
        format:
          type: string
          enum: [approval, ranking, score]
        candidates:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/DatasetCandidate'
        voters:
          type: integer
          minimum: 1
        seed:
          type: integer
        approval_max_choices:
          type: integer
        ranking_top_k:
          type: integer
        score_min:
          type: integer
        score_max:
          type: integer
        score_step:
          type: integer

    DatasetCreateResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string

    ExperimentCreateRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [algo, behavior]
        params:
          type: object
          additionalProperties: true
        seed:
          type: integer

    ExperimentCreateResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid

    Experiment:
      type: object
      required: [id, type, status, created_by, created_at]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        params: {}
        status:
          type: string
        seed:
          type: integer
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    ExperimentListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Experiment'

    ExperimentRunBatchRequest:
      type: object
      required: [experiment_id, dataset_ids]
      properties:
        experiment_id:
          type: string
          format: uuid
        dataset_ids:
          type: array
          minItems: 1
          items:
            type: string

    ExperimentRunItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        experiment_id:
          type: string
          format: uuid
        dataset_id:
          type: string
        status:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
      additionalProperties: true

    ExperimentRunListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ExperimentRunItem'

    ExperimentRunResultResponse:
      description: Dynamic JSON payload produced by experiment result processing.
      additionalProperties: true

    JobItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
        status:
          type: string
        progress:
          type: integer
        created_by:
          type: string
          format: uuid
        election_id:
          type: string
          format: uuid
        experiment_id:
          type: string
          format: uuid
        experiment_run_id:
          type: string
          format: uuid
        payload:
          type: object
          additionalProperties: true
        result_ref:
          type: object
          additionalProperties: true
        error_text:
          type: string
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
      additionalProperties: true
    
    TallyRuleInfo:
      type: object
      required:
        - id
        - label
        - ballot_formats
        - supports_election_tally
        - supports_experiment_runs
        - requires_committee_size
        - supports_quota_type
        - requires_approval_max_choices
        - supports_ranking_top_k
        - requires_score_range
      properties:
        id:
          type: string
        label:
          type: string
        ballot_formats:
          type: array
          items:
            type: string
            enum: [approval, ranking, score]
        supports_election_tally:
          type: boolean
        supports_experiment_runs:
          type: boolean
        requires_committee_size:
          type: boolean
        supports_quota_type:
          type: boolean
        requires_approval_max_choices:
          type: boolean
        supports_ranking_top_k:
          type: boolean
        requires_score_range:
          type: boolean

    TallyRuleListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TallyRuleInfo'

    JobListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/JobItem'

    AuditItem:
      type: object
      required: [id, occurred_at, event_type, details]
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
        occurred_at:
          type: string
          format: date-time
        actor_user_id:
          type: string
          format: uuid
        event_type:
          type: string
        details:
          type: object
          additionalProperties: true
      additionalProperties: true

    AuditListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditItem'

paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      responses:
        '200':
          description: Service is healthy

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new voter account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registration succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation or invite-code error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout succeeded
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  
  /api/v1/auth/change-password:
    post:
      tags: [Auth]
      summary: Change current user password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Validation or business error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/elections:
    get:
      tags: [Elections]
      summary: List elections visible to current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Elections list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ElectionListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Elections]
      summary: Create election
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ElectionCreateRequest'
      responses:
        '200':
          description: Election created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ElectionCreateResponse'
        '400':
          description: Validation or contract error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/elections/{id}:
    get:
      tags: [Elections]
      summary: Get election details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Election details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ElectionDetail'
        '400':
          description: Invalid election id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Election not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/elections/{id}/rules:
    put:
      tags: [Elections]
      summary: Update election rules
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ElectionRulesUpdateRequest'
      responses:
        '200':
          description: Rules updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Validation or contract error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Election not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Rules can be updated only in allowed statuses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/elections/{id}/actions/{action}:
    post:
      tags: [Elections]
      summary: Perform election lifecycle action
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [schedule, open, pause, resume, close, publish]
      responses:
        '200':
          description: Action applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Election not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/elections/{id}/invites:
    post:
      tags: [Elections]
      summary: Create invite
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteCreateRequest'
      responses:
        '200':
          description: Invite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteCreated'
        '400':
          description: Validation or contract error
          content:
            application/json:
              schema:
