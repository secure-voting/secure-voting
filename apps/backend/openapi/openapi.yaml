openapi: 3.1.0
info:
  title: Secure Voting REST API
  version: 0.1.0
  description: >
    REST API for the secure-voting diploma project:
    client-server application for conducting and evaluating multi-member electronic elections.

servers:
  - url: http://localhost:3001

tags:
  - name: System
  - name: Capabilities
  - name: Auth
  - name: Admin
  - name: Elections
  - name: Ballots
  - name: Results
  - name: Experiments
  - name: Experiment Runs
  - name: Jobs
  - name: Audit
  - name: Notifications

components:
  securitySchemes:
  bearerAuth:
    type: http
    scheme: bearer
    bearerFormat: opaque-access-token

  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          const: true

    User:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum: [admin, voter, researcher]
        full_name:
          type: string
        phone:
          type: string

    AuthResponse:
      type: object
      required: [access_token, expires_at, refresh_token, refresh_expires_at, user]
      properties:
        access_token:
          type: string
          description: Short-lived opaque bearer token used in the Authorization header.
        expires_at:
          type: string
          format: date-time
          description: Access token expiration timestamp.
        refresh_token:
          type: string
          description: Long-lived opaque refresh token used only with /api/v1/auth/refresh.
        refresh_expires_at:
          type: string
          format: date-time
          description: Refresh token expiration timestamp.
        user:
          $ref: '#/components/schemas/User'
    
    AdminUser:
      type: object
      required: [id, email, role, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum: [admin, voter, researcher]
        full_name:
          type: string
        phone:
          type: string
        created_at:
          type: string
          format: date-time

    AdminUserListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminUser'

    AdminUserRoleUpdateRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [admin, voter, researcher]

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        invite_code:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        invite_code:
          type: string

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Opaque refresh token returned by register, login, or refresh.

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string
    
    UpdateProfileRequest:
      type: object
      properties:
        full_name:
          type: string
        phone:
          type: string
    
    NotificationItem:
      type: object
      required: [id, title, message, kind, created_at, read]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        message:
          type: string
        details:
          type: string
        action_label:
          type: string
        action_to:
          type: string
        kind:
          type: string
          enum: [info, success, warning, error]
        created_at:
          type: string
          format: date-time
        read:
          type: boolean

    NotificationListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/NotificationItem'

    NotificationCreateRequest:
      type: object
      required: [title, message]
      properties:
        title:
          type: string
        message:
          type: string
        details:
          type: string
        action_label:
          type: string
        action_to:
          type: string
        kind:
          type: string
          enum: [info, success, warning, error]

    AdminSettings:
      type: object
      required:
        - tls_mode
        - backup_enabled
      properties:
        public_base_url:
          type: string
        tls_mode:
          type: string
          enum: [disabled, lets_encrypt, custom]
        tls_domain:
          type: string
        tls_contact_email:
          type: string
        backup_enabled:
          type: boolean
        backup_schedule:
          type: string
        backup_retention_days:
          type: integer
        database_host:
          type: string
        database_name:
          type: string
        updated_at:
          type: string
          format: date-time
        has_unsaved_warning:
          type: boolean

    AdminSettingsUpdateRequest:
      type: object
      required:
        - tls_mode
        - backup_enabled
      properties:
        public_base_url:
          type: string
        tls_mode:
          type: string
          enum: [disabled, lets_encrypt, custom]
        tls_domain:
          type: string
        tls_contact_email:
          type: string
        backup_enabled:
          type: boolean
        backup_schedule:
          type: string
        backup_retention_days:
          type: integer
        database_host:
          type: string
        database_name:
          type: string

    CandidateInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        meta:
          type: object
          additionalProperties: true

    Candidate:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        meta:
          type: object
          additionalProperties: true
    
    CandidateImportResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CandidateInput'
    
    InviteImportItem:
      type: object
      required: [email]
      properties:
        email:
          type: string
        invite_id:
          type: string
          format: uuid
        status:
          type: string
        code:
          type: string

    InviteImportResponse:
      type: object
      required: [total, parsed, created, registration_required, skipped, failed]
      properties:
        total:
          type: integer
        parsed:
          type: integer
        created:
          type: array
          items:
            $ref: '#/components/schemas/InviteImportItem'
        registration_required:
          type: array
          items:
            $ref: '#/components/schemas/InviteImportItem'
        skipped:
          type: array
          items:
            $ref: '#/components/schemas/InviteImportItem'
        failed:
          type: array
          items:
            $ref: '#/components/schemas/InviteImportItem'

    ElectionCreateRequest:
      type: object
      required:
        - title
        - start_at
        - end_at
        - tally_rule
        - ballot_format
        - access_mode
        - candidates
      properties:
        title:
          type: string
        description:
          type: string
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        tally_rule:
          type: string
        ballot_format:
          type: string
          enum: [approval, ranking, score]
        committee_size:
          type: integer
        quota_type:
          type: string
          enum: [hare, droop]
        access_mode:
          type: string
          enum: [open, invite]
        publish_at:
          type: string
          format: date-time
        show_aggregates:
          type: boolean
        approval_max_choices:
          type: integer
        ranking_top_k:
          type: integer
        score_min:
          type: integer
        score_max:
          type: integer
        score_step:
          type: integer
        score_allow_skip:
          type: boolean
        candidates:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/CandidateInput'

    ElectionCreateResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid

    ElectionSummary:
      type: object
      required:
        - id
        - title
        - status
        - access_mode
        - start_at
        - end_at
        - organizer_email
        - ballot_format
        - tally_rule
        - candidate_count
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
        access_mode:
          type: string
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        published_at:
          type: string
          format: date-time
        organizer_email:
          type: string
        ballot_format:
          type: string
          enum: [approval, ranking, score]
        tally_rule:
          type: string
        candidate_count:
          type: integer

    ElectionListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ElectionSummary'

    ElectionDetail:
      type: object
      required:
        - id
        - title
        - status
        - access_mode
        - ballot_format
        - tally_rule
        - start_at
        - end_at
        - show_aggregates
        - score_allow_skip
        - candidates
        - created_by
        - created_at
        - organizer_email
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
        access_mode:
          type: string
          enum: [open, invite]
        ballot_format:
          type: string
          enum: [approval, ranking, score]
        tally_rule:
          type: string
        committee_size:
          type: integer
        quota_type:
          type: string
          enum: [hare, droop]
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        publish_at:
          type: string
          format: date-time
        published_at:
          type: string
          format: date-time
        show_aggregates:
          type: boolean
        approval_max_choices:
          type: integer
        ranking_top_k:
          type: integer
        score_min:
          type: integer
        score_max:
          type: integer
        score_step:
          type: integer
        score_allow_skip:
          type: boolean
        submitted_ballots_count:
          type: integer
        invites_total_count:
          type: integer
        invites_accepted_count:
          type: integer
        invites_pending_count:
          type: integer
        invites_revoked_count:
          type: integer
        invites_failed_count:
          type: integer
        invites_registration_required_count:
          type: integer
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        organizer_email:
          type: string
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/Candidate'

    ElectionRulesUpdateRequest:
      type: object
      properties:
        tally_rule:
          type: string
        ballot_format:
          type: string
          enum: [approval, ranking, score]
        committee_size:
          type: integer
        quota_type:
          type: string
          enum: [hare, droop]
        access_mode:
          type: string
          enum: [open, invite]
        publish_at:
          type: string
          format: date-time
        show_aggregates:
          type: boolean
        approval_max_choices:
          type: integer
        ranking_top_k:
          type: integer
        score_min:
          type: integer
        score_max:
          type: integer
        score_step:
          type: integer
        score_allow_skip:
          type: boolean

    InviteCreateRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string

    InviteCreated:
      type: object
      required:
        - invite_id
        - email
        - status
        - created_at
        - registration_required
        - registration_email_sent
        - invite_email_sent
      properties:
        invite_id:
          type: string
          format: uuid
        email:
          type: string
        invite_code:
          type: string
          description: Present only when an invite code was created for an already registered email.
        status:
          type: string
        created_at:
          type: string
          format: date-time
        registration_required:
          type: boolean
        registration_email_sent:
          type: boolean
        invite_email_sent:
          type: boolean

    Invite:
      type: object
      required: [id, email, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        status:
          type: string
        sent_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    InviteListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Invite'

    BallotMetaResponse:
      type: object
      required: [election_id, ballot_format, tally_rule, score_allow_skip, candidates]
      properties:
        election_id:
          type: string
          format: uuid
        ballot_format:
          type: string
          enum: [approval, ranking, score]
        tally_rule:
          type: string
        approval_max_choices:
          type: integer
        ranking_top_k:
          type: integer
        score_min:
          type: integer
        score_max:
          type: integer
        score_step:
          type: integer
        score_allow_skip:
          type: boolean
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/Candidate'

    BallotSubmitRequest:
      type: object
      properties:
        approval_set:
          type: array
          items:
            type: string
        ranking:
          type: array
          items:
            type: string
        scores:
          type: object
          additionalProperties:
            type: integer

    BallotSubmitResponse:
      type: object
      required: [ballot_id, status]
      properties:
        ballot_id:
          type: string
          format: uuid
        status:
          type: string

    MyBallotResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
        submitted_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ResultResponse:
      type: object
      description: Latest persisted election result produced by asynchronous compute tally.
      required: [election_id, version, method, winners]
      properties:
        election_id:
          type: string
          format: uuid
        version:
          type: integer
        method:
          type: string
        winners: {}
        params: {}
        metrics: {}
        protocol: {}
        published_at:
          type: string
          format: date-time

    DatasetCandidate:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string

    Dataset:
      type: object
      required: [id, name, source, format, candidates, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        source:
          type: string
          enum: [import, generate, external]
        format:
          type: string
          enum: [approval, ranking, score]
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/DatasetCandidate'
        created_at:
          type: string
          format: date-time
        seed:
          type: integer
        parameters:
          type: object
          additionalProperties: true

    DatasetListItem:
      type: object
      required: [id, name, source, format, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        source:
          type: string
        format:
          type: string
        created_at:
          type: string
          format: date-time

    DatasetListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DatasetListItem'

    DatasetGenerateRequest:
      type: object
      required: [name, format, candidates, voters]
      properties:
        name:
          type: string
        description:
          type: string
        format:
          type: string
          enum: [approval, ranking, score]
        candidates:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/DatasetCandidate'
        voters:
          type: integer
          minimum: 1
        seed:
          type: integer
        approval_max_choices:
          type: integer
        ranking_top_k:
          type: integer
        score_min:
          type: integer
        score_max:
          type: integer
        score_step:
          type: integer
        generation_model:
          type: string
          enum: [uniform, consensus, polarized]
          description: >
            Synthetic ballot generation model.
            uniform = independent random generation,
            consensus = ballots concentrated around one common preference order,
            polarized = ballots split into opposing preference blocs.

    DatasetCreateResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string

    ExperimentCreateRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [algo, behavior]
        params:
          type: object
          additionalProperties: true
        seed:
          type: integer

    ExperimentCreateResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid

    Experiment:
      type: object
      required: [id, type, status, created_by, created_at]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        params: {}
        status:
          type: string
        seed:
          type: integer
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    ExperimentListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Experiment'

    ExperimentRunBatchRequest:
      type: object
      required: [experiment_id, dataset_ids]
      properties:
        experiment_id:
          type: string
          format: uuid
        dataset_ids:
          type: array
          minItems: 1
          items:
            type: string

    ExperimentRunItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        experiment_id:
          type: string
          format: uuid
        dataset_id:
          type: string
        status:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
      additionalProperties: true

    ExperimentRunListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ExperimentRunItem'

    ExperimentRunResultResponse:
      description: Dynamic JSON payload produced by experiment result processing.
      additionalProperties: true

    JobItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          description: >
            Job kind. For election close flow, tally means an asynchronous election tally
            task processed through the compute pipeline.
        status:
          type: string
        progress:
          type: integer
        created_by:
          type: string
          format: uuid
        election_id:
          type: string
          format: uuid
        experiment_id:
          type: string
          format: uuid
        experiment_run_id:
          type: string
          format: uuid
        payload:
          type: object
          additionalProperties: true
        result_ref:
          type: object
          additionalProperties: true
          description: Reference to persisted result artifacts created after job completion.
        error_text:
          type: string
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
      additionalProperties: true
    
    TallyRuleInfo:
      type: object
      description: >
        Capability metadata for one tally rule as reported by the compute service.
        Used by admin and researcher forms to determine which ballot formats are allowed
        and which rule-specific parameters are applicable.
      required:
        - id
        - label
        - ballot_formats
        - supports_election_tally
        - supports_experiment_runs
        - requires_committee_size
        - supports_quota_type
        - requires_approval_max_choices
        - supports_ranking_top_k
        - requires_score_range
      properties:
        id:
          type: string
          description: Canonical machine-readable tally-rule identifier.
          example: plurality
        label:
          type: string
          description: Human-readable rule label returned by the compute service.
          example: Plurality
        ballot_formats:
          type: array
          description: Ballot formats allowed for this rule.
          items:
            type: string
            enum: [approval, ranking, score]
          example: [ranking]
        supports_election_tally:
          type: boolean
          description: Whether the rule is available for election tally flows.
          example: true
        supports_experiment_runs:
          type: boolean
          description: Whether the rule is available for experiment runs.
          example: true
        requires_committee_size:
          type: boolean
          description: Whether committee_size must be provided for this rule.
          example: true
        supports_quota_type:
          type: boolean
          description: Whether quota_type is applicable for this rule.
          example: false
        requires_approval_max_choices:
          type: boolean
          description: Whether approval_max_choices is required for approval ballots.
          example: false
        supports_ranking_top_k:
          type: boolean
          description: Whether ranking_top_k may be used with this rule.
          example: true
        requires_score_range:
          type: boolean
          description: Whether score_min, score_max, and score_step are required.
          example: false

    TallyRuleListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TallyRuleInfo'
      example:
        items:
          - id: plurality
            label: Plurality
            ballot_formats: [ranking]
            supports_election_tally: true
            supports_experiment_runs: true
            requires_committee_size: true
            supports_quota_type: false
            requires_approval_max_choices: false
            supports_ranking_top_k: true
            requires_score_range: false

    JobListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/JobItem'

    AuditItem:
      type: object
      required: [id, occurred_at, event_type, details]
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
        occurred_at:
          type: string
          format: date-time
        actor_user_id:
          type: string
          format: uuid
        event_type:
          type: string
        details:
          type: object
          additionalProperties: true
      additionalProperties: true

    AuditListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditItem'
    
    SystemComponentStatus:
      type: object
      required: [ok, status]
      properties:
        ok:
          type: boolean
        status:
          type: string
        details:
          type: object
          additionalProperties: true

    SystemStatusResponse:
      type: object
      required: [backend, compute, worker, checked_at]
      properties:
        backend:
          $ref: '#/components/schemas/SystemComponentStatus'
        compute:
          $ref: '#/components/schemas/SystemComponentStatus'
        worker:
          $ref: '#/components/schemas/SystemComponentStatus'
        checked_at:
          type: string
          format: date-time

paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      responses:
        '200':
          description: Service is healthy

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new voter account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registration succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
