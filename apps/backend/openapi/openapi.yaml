  /api/v1/elections/{id}/actions/{action}:
    post:
      tags: [Elections]
      summary: Perform election lifecycle action
      description: >
        Applies an election lifecycle transition.
        The close action does not calculate results inline.
        It closes the election and enqueues an asynchronous tally job
        processed by the compute pipeline.
        The publish action publishes the latest persisted result version
        and does not recalculate the tally.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [schedule, open, pause, resume, close, publish]
      responses:
        '200':
          description: Action applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Invalid request
          content:
            application/json:
