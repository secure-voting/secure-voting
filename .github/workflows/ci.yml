name: secure-voting-ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: secure-voting-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-fast:
    name: backend fast checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/backend/go.mod
          cache: true
          cache-dependency-path: |
            apps/backend/go.sum
            apps/backend/go.mod

      - name: Run go test
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Build backend binaries
        run: |
          go build ./cmd/api
          go build ./cmd/worker
          go build ./cmd/compute-runner

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.2
          working-directory: apps/backend
          args: --timeout=5m

  frontend-fast:
    name: frontend typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run build
        run: npm run build

  openapi-validate:
    name: openapi validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validator
        run: python3 -m pip install --upgrade pip openapi-spec-validator PyYAML

      - name: Validate OpenAPI spec
        run: python3 -c "from openapi_spec_validator import validate_spec; import yaml; spec=yaml.safe_load(open('apps/backend/openapi/openapi.yaml', 'r', encoding='utf-8')); validate_spec(spec); print('OpenAPI spec is valid')"

  integration-tests:
    name: integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - backend-fast
      - frontend-fast
      - openapi-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y curl jq

      - name: Ensure scripts are executable
        run: chmod +x scripts/ci/*.sh scripts/*.sh

      - name: Run integration suite
        run: bash scripts/ci/run_integration_suite.sh

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-artifacts
          path: .ci-artifacts/

  e2e-tests:
    name: e2e tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs:
      - backend-fast
      - frontend-fast
      - openapi-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y curl jq

      - name: Ensure scripts are executable
        run: chmod +x scripts/ci/*.sh scripts/*.sh

      - name: Run e2e suite
        run: bash scripts/ci/run_e2e_suite.sh

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: .ci-artifacts/