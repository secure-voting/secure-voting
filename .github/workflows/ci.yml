name: secure-voting-ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: secure-voting-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-fast:
    name: backend fast checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/backend/go.mod
          cache: true
          cache-dependency-path: |
            apps/backend/go.sum
            apps/backend/go.mod

      - name: Run go test
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run system status handler tests
        run: go test ./internal/httpserver -run TestSystemStatus

      - name: Run elections rule matrix contract tests
        run: go test ./internal/elections -run 'Test(BuildRuleMatrix|ValidateRuleCompatibility)'

      - name: Run capabilities handler tests
        run: go test ./internal/httpserver/capabilities
        
      - name: Build backend binaries
        run: |
          go build ./cmd/api
          go build ./cmd/worker
          go build ./cmd/compute-runner

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.2
          working-directory: apps/backend
          args: --timeout=5m

  frontend-fast:
    name: frontend typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run build
        run: npm run build

  openapi-validate:
    name: openapi validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure scripts are executable
        run: |
          find scripts -type f -name "*.sh" -exec chmod +x {} +
          chmod +x launch.sh || true

      - name: Check capabilities OpenAPI contract
        run: bash scripts/ci/check_openapi_capabilities.sh

  
  moon-workspace-check:
    name: moon workspace checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - backend-fast
      - frontend-fast
      - openapi-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system tools
        run: sudo apt-get update && sudo apt-get install -y curl jq protobuf-compiler

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/backend/go.mod
          cache: true
          cache-dependency-path: |
            apps/backend/go.sum
            apps/backend/go.mod

      - name: Setup Node for frontend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Setup Node for Playwright E2E
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install E2E dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Setup Node for load tests
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/load/package-lock.json

      - name: Install load test dependencies
        working-directory: tests/load
        run: npm ci

      - name: Setup Moon toolchain
        uses: moonrepo/setup-toolchain@v0

      - name: Run Moon project checks
        run: |
          moon project frontend
          moon project backend
          moon project compute
          moon project root
          moon project e2e
          moon project load

      - name: Run Moon frontend checks
        run: |
          moon run frontend:typecheck
          moon run frontend:build

      - name: Run Moon backend checks
        run: |
          moon run backend:test
          moon run backend:vet
          moon run backend:lint
          moon run backend:build

      - name: Run Moon root checks
        run: |
          moon run root:compose-config
          moon run root:scripts-syntax
          moon run root:openapi-capabilities
          moon run root:check

      - name: Run Moon test package typechecks
        run: |
          moon run e2e:typecheck
          moon run load:typecheck

  integration-tests:
    name: integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - backend-fast
      - frontend-fast
      - openapi-validate
      - moon-workspace-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y curl jq

      - name: Ensure scripts are executable
        run: |
          find scripts -type f -name "*.sh" -exec chmod +x {} +
          chmod +x launch.sh || true

      - name: Create .env.integration
        run: |
          cat > .env.integration <<'EOF2'
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=secure_voting

          REDIS_PASSWORD=redispass

          MONGO_INITDB_ROOT_USERNAME=root
          MONGO_INITDB_ROOT_PASSWORD=mongopass

          BOOTSTRAP_ADMIN_EMAIL=admin@example.com
          BOOTSTRAP_ADMIN_PASSWORD=AdminPass123!
          BOOTSTRAP_RESEARCHER_EMAIL=researcher@example.com
          BOOTSTRAP_RESEARCHER_PASSWORD=ResearcherPass123!

          POSTGRES_DSN=postgres://postgres:postgres@127.0.0.1:15432/secure_voting?sslmode=disable
          REDIS_ADDR=127.0.0.1:16379
          REDIS_PASSWORD=redispass
          MONGO_URI=mongodb://root:mongopass@127.0.0.1:17017/?authSource=admin

          SECURE_VOTING_INTEGRATION=1
          EOF2

      - name: Run integration suite
        run: bash scripts/ci/run_integration_suite.sh

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-artifacts
          path: .ci-artifacts/
          if-no-files-found: ignore


  playwright-e2e-tests:
    name: playwright api e2e tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - backend-fast
      - frontend-fast
      - openapi-validate
      - moon-workspace-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node for Playwright E2E
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y curl jq

      - name: Ensure scripts are executable
        run: |
          find scripts -type f -name "*.sh" -exec chmod +x {} +
          chmod +x launch.sh || true

      - name: Run Playwright E2E suite
        run: bash scripts/ci/run_playwright_e2e_suite.sh

      - name: Upload Playwright E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-artifacts
          path: .ci-artifacts/playwright-e2e/
          if-no-files-found: ignore
  
  load-tests:
    name: load smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - backend-fast
      - frontend-fast
      - openapi-validate
      - moon-workspace-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node for load tests
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/load/package-lock.json

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y curl jq

      - name: Ensure scripts are executable
        run: |
          find scripts -type f -name "*.sh" -exec chmod +x {} +
          chmod +x launch.sh || true

      - name: Run load smoke suite
        run: bash scripts/ci/run_load_suite.sh

      - name: Upload load artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-artifacts
          path: .ci-artifacts/load/
          if-no-files-found: ignore
