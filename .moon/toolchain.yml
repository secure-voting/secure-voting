unstable_rust:
  version: '1.92.0'
  bins:
    - 'cargo-audit'
    - 'cargo-bloat'
    - 'cargo-deny'
    - 'cargo-nextest'
    - 'cargo-tarpaulin'
  components:
    - 'clippy'
    - 'rustfmt'
    - 'rust-analyzer'
  targets:
    - 'x86_64-unknown-linux-gnu'
    - 'x86_64-pc-windows-msvc'
  syncToolchainConfig: true
