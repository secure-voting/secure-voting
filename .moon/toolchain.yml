unstable_rust:
  version: '1.92.0'
  bins:
    - 'cargo-audit'
    - 'cargo-bloat'
    - 'cargo-deny'
    - 'cargo-geiger'
    - 'cargo-llvm-cov'
    - 'cargo-machete'
    - 'cargo-nextest'
    - 'cargo-outdated'
    - 'cargo-pgo'
    - 'cargo-public-api'
    - 'cargo-vet'
  components:
    - 'clippy'
    - 'rustfmt'
    - 'rust-analyzer'
  targets:
    - 'x86_64-unknown-linux-gnu'
    - 'x86_64-pc-windows-msvc'
  syncToolchainConfig: true
